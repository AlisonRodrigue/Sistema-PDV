<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goki</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cadastroCliente.css">
</head>

<body>
    <div class="sidebar">
        <ul>
            <li><a href="login.html"class="active">🏠 Login</a></li>
            <li><a href="index.html">📦 Cadastro</a></li>
            <li><a href="vendas.html">💰 Duvidas</a></li>
            <li><a href="investimentos.html" >💰 Contato</a></li>
        </ul>
    </div>
    <main class="content">
        <div class="main-layout">
            <form action="" id="formularioLogin">
                <h1>Login</h1>
                <div class="form-grid">   
                    <div class="form-group">
                        <label for="Email">Email</label>
                        <input type="email" id="emailCliente" class="campoCliente" placeholder="@email" required>
                    </div>
                    <div class="form-group">
                        <label for="Senha">Senha</label>
                        <input type="password" id="senhaCliente" class="campoCliente" placeholder="Digite uma senha" required>
                    </div>   
                    </div>
                    <div class="btnCadastro">
                        <button id="btnCadastro" class="btn-submit" onclick="Login()">Login</button>
                    </div>
                </div>
            </form>
        </div>
    </main>
    <script src="cadastroCliente.js"></script>
</body>

</html>
