<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goki</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="pdv.css">
</head>

<body>
    <div class="sidebar">
        <div class="logo">🛒 Mercearia Pai e Filho</div>
        <ul>
            <li><a href="../dashboard.html">🏠 Painel principal</a></li>
            <li><a href="cadastro.html">📦 Cadastro</a></li>
            <li><a href="caixa.html" class="active">💰 Caixa</a></li>
            <li><a href="#">💰 Contato</a></li>
        </ul>
    </div>
    <main class="content">
        <div class="pvd-grid">
            <section class="pvd-left">
                <div class="search-bar">
                    <div class="input-group">
                        <label>Código de Barras / Pesquisar Produto (F2)</label>
                        <input type="text" id="barcode-input" placeholder="Passe o leitor ou gigite o nome..."
                            autofocus>
                    </div>

                    <div class="input-group qty">
                        <label>Qtd</label>
                        <input type="number" id="qty-input" value="1" min="1">
                    </div>
                </div>

                <div class="items-list-container">
                    <table class="pdv-table">
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th>Código</th>
                                <th>Descrição</th>
                                <th>Qtd</th>
                                <th>Vl. Unit</th>
                                <th>Subtotal</th>
                            </tr>
                        </thead>
                        <tbody id="cart-items">

                        </tbody>
                    </table>
                </div>
            </section>

            <section class="pdv-right">
                <div class="product-display">
                    <h2>CAIXA LIVRE</h2>
                </div>

                <div class="totals-panel">
                    <div class="total-item">
                        <span>Itens:</span>
                        <span id="total-items">2</span>
                    </div>
                    <div class="total-item main-total">
                        <span>TOTAL:</span>
                        <span id="grand-total">R$ 42,90</span>
                    </div>
                </div>

                <div class="actions-panel">
                    <button class="btn-finish">FINALIZAR (F8)</button>
                    <button class="btn-cancel">CANCELAR ITEM (DEL)</button>
                </div>

                <div class="shortcuts">
                    <p><strong>F2</strong> Pesquisar | <strong>F8</strong> Pagar | <strong>F9</strong> Sangria</p>
                </div>
            </section>
        </div>
    </main>
    <div id="modal-pagamento" class="modal-overlay">
        <div class="modal-content">
            <header class="modal-header">
                <h2>Finalizar Venda</h2>
                <button class="close-modal">&times;</button>
            </header>

            <div class="modal-body">
                <div class="total-venda-destaque">
                    <span>TOTAL A PAGAR</span>
                    <strong id="total-modal">R$ </strong>
                </div>

                <div class="pagamento-opcoes">
                    <label>Forma de Pagamento</label>
                    <div class="metodos-grid">
                        <button class="btn-metodo active">💵 Dinheiro</button>
                        <button class="btn-metodo">💳 Cartão</button>
                        <button class="btn-metodo">📱 Pix</button>
                    </div>
                </div>

                <div class="calculo-troco">
                    <div class="input-group">
                        <label>Valor Recebido</label>
                        <input type="number" id="valor-recebido" placeholder="0,00">
                    </div>
                    <div class="troco-display">
                        <span>TROCO:</span>
                        <strong id="valor-troco">R$ 0,00</strong>
                    </div>
                </div>
            </div>

            <footer class="modal-footer">
                <button class="btn-cancelar-venda">CANCELAR (ESC)</button>
                <button class="btn-confirmar-venda">CONFIRMAR VENDA (F10)</button>
            </footer>
        </div>
</body>

</html>
